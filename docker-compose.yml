
services:
  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data              # persist data across restarts
    command: redis-server --appendonly yes  # enable AOF persistence
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── ChromaDB ────────────────────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: portfolio_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma    # persist embeddings across restarts
    environment:
      - IS_PERSISTENT=TRUE            # write to disk, not just RAM
      - ANONYMIZED_TELEMETRY=FALSE    # no phone-home data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
    driver: local
  chroma_data:
    driver: local
